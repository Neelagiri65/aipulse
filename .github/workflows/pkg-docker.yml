name: pkg-docker

# Docker Hub adoption ingest: fetch /v2/repositories/{ns}/{name} for the
# tracked AI container image slate (ollama/ollama, vllm/vllm-openai) and
# overwrite the `pkg:docker:latest` blob in Upstash Redis. Captures
# {allTime, stars} from pull_count + star_count. No day/week/month
# windows — Docker Hub doesn't publish them.
#
# Cadence: every 6 hours at :45 (00:45, 06:45, 12:45, 18:45 UTC). Fourth
# slot in the registry 10-minute stagger (pypi :15 / npm :25 / crates
# :35 / docker :45 / brew :55).
#
# GHCR is deliberately out of scope — session-32 research found that
# supporting one image (text-generation-inference) wasn't worth the
# separate OAuth handshake. Revisit with a dedicated fetcher.
#
# Required repo secrets (shared with other ingest workflows):
#   INGEST_URL     — e.g. https://aipulse-pi.vercel.app/api/ingest
#                    (we strip /api/ingest and append the docker path)
#   INGEST_SECRET  — shared secret matching the Vercel env var

on:
  schedule:
    - cron: "45 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Attribution tag (cron | manual)"
        required: false
        default: "manual"
        type: string

concurrency:
  group: pkg-docker
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger Docker Hub ingest on Vercel
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.source || 'cron' }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$INGEST_SECRET" ]; then
            echo "::error::INGEST_URL or INGEST_SECRET is unset in repo secrets"
            exit 1
          fi
          BASE="${INGEST_URL%/api/ingest}"
          URL="$BASE/api/pkg/docker?source=$SOURCE"
          echo "POST $URL"
          RESPONSE=$(curl -sS -f --max-time 150 \
            -H "x-ingest-secret: $INGEST_SECRET" \
            -X POST \
            "$URL")
          echo "Response: $RESPONSE"
