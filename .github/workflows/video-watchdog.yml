name: video-watchdog

# Watchdog for the daily video pipeline.
# Runs 2.5 hours after the main pipeline (09:30 UTC vs 07:00 UTC).
#
# Checks:
#   1. Did today's video get uploaded? (checks upload-log.json in repo)
#   2. If not → dispatch daily-video.yml for retry
#   3. Weekly: check last 7 days for gaps, report to Discord
#
# Required repo secrets:
#   DISCORD_DAILY_WEBHOOK_URL — for alerts
#   VIDEO_WATCHDOG_PAT        — PAT with actions:write to dispatch workflows
#                                (GITHUB_TOKEN can't dispatch in the same repo)

on:
  schedule:
    - cron: "30 9 * * *" # 09:30 UTC daily
  workflow_dispatch:

concurrency:
  group: video-watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DISCORD_DAILY_WEBHOOK_URL: ${{ secrets.DISCORD_DAILY_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check today's upload
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"

          if [ ! -f data/upload-log.json ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Upload log does not exist"
            exit 0
          fi

          # Check if today's date appears in the upload log
          if jq -e --arg d "$TODAY" '.[] | select(.date == $d)' data/upload-log.json > /dev/null 2>&1; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "Today's video found in upload log"
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Today's video NOT in upload log — will retry"
          fi

      - name: Retry pipeline
        if: steps.check.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.VIDEO_WATCHDOG_PAT || github.token }}
          script: |
            console.log('Dispatching daily-video retry...');
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'daily-video.yml',
                ref: 'main',
                inputs: {
                  formats: 'youtube',
                  force_distribute: 'true',
                },
              });
              console.log('Retry dispatched successfully');
            } catch (e) {
              console.error('Failed to dispatch retry:', e.message);
              core.setFailed(`Retry dispatch failed: ${e.message}`);
            }

      - name: Alert on missing video
        if: steps.check.outputs.missing == 'true'
        run: |
          if [ -n "$DISCORD_DAILY_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_DAILY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"content\": \"**WATCHDOG** — No video uploaded for ${{ steps.check.outputs.date }}. Retry dispatched.\\nIf this persists, check: https://github.com/${{ github.repository }}/actions\",
                \"username\": \"Gawk Watchdog\"
              }"
          fi

      - name: Compute day of week
        id: dow
        run: echo "dow=$(date -u +%u)" >> "$GITHUB_OUTPUT"

      - name: Weekly gap report (Mondays)
        if: steps.dow.outputs.dow == '1' || github.event_name == 'workflow_dispatch'
        run: |
          if [ ! -f data/upload-log.json ]; then
            echo "No upload log — skipping gap report"
            exit 0
          fi

          # Check last 7 days for gaps
          GAPS=""
          for i in $(seq 0 6); do
            CHECK_DATE=$(date -u -d "-${i} days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d)
            if ! jq -e --arg d "$CHECK_DATE" '.[] | select(.date == $d)' data/upload-log.json > /dev/null 2>&1; then
              GAPS="$GAPS $CHECK_DATE"
            fi
          done

          if [ -n "$GAPS" ]; then
            echo "Gaps found:$GAPS"
            if [ -n "$DISCORD_DAILY_WEBHOOK_URL" ]; then
              curl -s -X POST "$DISCORD_DAILY_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{
                  \"content\": \"**WEEKLY GAP REPORT** — Missing videos for:$GAPS\\nCheck pipeline health: https://github.com/${{ github.repository }}/actions\",
                  \"username\": \"Gawk Watchdog\"
                }"
            fi
          else
            echo "No gaps in last 7 days"
          fi
