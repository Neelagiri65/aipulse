name: wire-ingest-hn

# Hacker News wire ingest: fetch Algolia recent stories, filter for
# AI-relevance with deterministic keyword/domain rules, resolve author
# locations via Firebase HN user profiles, write items + authors +
# wire ZSET to Upstash Redis.
#
# Cadence: every 15 minutes at :05/:20/:35/:50 to avoid colliding
# with globe-ingest (:*/10) and registry-backfill-events (:15). Cap=20
# stories per run matches the PRD sanity range (0–20) and keeps us
# well inside the route's maxDuration=120 and Upstash free-tier
# command budget (~45 commands/poll).
#
# Required repo secrets (shared with other ingest workflows):
#   INGEST_URL     — e.g. https://aipulse-pi.vercel.app/api/ingest
#                    (we strip /api/ingest and append the HN path)
#   INGEST_SECRET  — shared secret matching the Vercel env var

on:
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Meta label for HnIngestMeta.source attribution"
        required: false
        default: "manual"
        type: string
      cap:
        description: "Max AI-relevant stories per run (1-20; cron default 20)"
        required: false
        default: "20"
        type: string

concurrency:
  group: wire-ingest-hn
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger HN wire ingest on Vercel
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.source || 'cron' }}
          CAP: ${{ github.event_name == 'workflow_dispatch' && inputs.cap || '20' }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$INGEST_SECRET" ]; then
            echo "::error::INGEST_URL or INGEST_SECRET is unset in repo secrets"
            exit 1
          fi
          BASE="${INGEST_URL%/api/ingest}"
          URL="$BASE/api/wire/ingest-hn?source=$SOURCE&cap=$CAP"
          echo "POST $URL"
          RESPONSE=$(curl -sS -f --max-time 150 \
            -H "x-ingest-secret: $INGEST_SECRET" \
            -X POST \
            "$URL")
          echo "Response: $RESPONSE"
