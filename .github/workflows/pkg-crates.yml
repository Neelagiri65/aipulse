name: pkg-crates

# crates.io adoption ingest: fetch /api/v1/crates/{name} for the tracked
# Rust AI/ML crate slate (candle-core, burn, tch, ort) and overwrite the
# `pkg:crates:latest` blob in Upstash Redis. Captures {last90d, allTime}
# from the `recent_downloads` + `downloads` fields respectively — the
# registry does not expose last-day or last-week windows.
#
# Cadence: every 6 hours at :35 (00:35, 06:35, 12:35, 18:35 UTC).
# Offset 10 min after pkg-npm (:25) to stagger concurrent Vercel
# invocations; all five registry ingests align on the 6h tick with 10-min
# spacing (pypi :15 / npm :25 / crates :35 / docker :45 / brew :55).
#
# Required repo secrets (shared with other ingest workflows):
#   INGEST_URL     — e.g. https://aipulse-pi.vercel.app/api/ingest
#                    (we strip /api/ingest and append the crates path)
#   INGEST_SECRET  — shared secret matching the Vercel env var

on:
  schedule:
    - cron: "35 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Attribution tag (cron | manual)"
        required: false
        default: "manual"
        type: string

concurrency:
  group: pkg-crates
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Trigger crates.io ingest on Vercel
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.source || 'cron' }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$INGEST_SECRET" ]; then
            echo "::error::INGEST_URL or INGEST_SECRET is unset in repo secrets"
            exit 1
          fi
          BASE="${INGEST_URL%/api/ingest}"
          URL="$BASE/api/pkg/crates?source=$SOURCE"
          echo "POST $URL"
          RESPONSE=$(curl -sS -f --max-time 150 \
            -H "x-ingest-secret: $INGEST_SECRET" \
            -X POST \
            "$URL")
          echo "Response: $RESPONSE"
