name: heartbeat

# Drift-proof driver for the two live-critical, high-frequency ingests that
# GitHub's scheduler drops hardest: globe-ingest and notify-tool-alerts (both
# were `*/5 * * * *`). GitHub deprioritises frequent scheduled crons — on this
# repo the `*/5` jobs were firing only every 2-4h, so the live map aged toward
# its 4h window between real runs.
#
# The fix: a RUNNING job is immune to scheduler throttling. This workflow
# starts on an explicit-minute 4x/hour schedule and loops INTERNALLY every 5
# minutes, curling the ingest endpoints itself. `cancel-in-progress: true`
# bounds us to exactly one live instance — a landed restart cancels the
# mostly-sleeping predecessor (stateless, harmless) rather than stacking a
# queue.
#
# LOOP WINDOW (revised S93 on observed data): the original design assumed
# explicit-minute schedules restart every ~15 min and looped for 20. Observed
# reality (2026-07-05): scheduled fires landed 89-127 min apart (median 96) —
# GitHub throttles even explicit-minute schedules. A 20-min loop therefore
# covered only ~20% of wall-clock, and since #64 retired the ingests' own
# schedules, the map got ZERO ticks in the dead stretches (invisible on the
# status bar — the gaps sat just under the 2x stale budgets). The loop now
# runs 175 min (> the 127-min max observed gap, ~40% margin; well under the
# 360-min hosted-runner job cap), so coverage is continuous as long as ANY
# fire lands within ~3h. When GitHub does honour the 15-min schedule, the
# restart cancels the loop early — behaviour identical to the original.
#
# Public repo → unlimited Actions minutes, so a near-continuous loop is free.
# Both endpoints are thin, idempotent poll-and-dedupe triggers (all compute is
# server-side on Vercel), so calling them every 5 minutes only restores the
# ORIGINALLY-DESIGNED `*/5` load — it adds nothing above the budget the
# ingests already assumed.
#
# Required repo secrets (same as globe-ingest / notify-tool-alerts):
#   INGEST_URL     — full URL to /api/ingest, e.g. https://…/api/ingest
#   INGEST_SECRET  — shared secret matching Vercel's INGEST_SECRET
#
# Scope note: reddit and the registry crons are deliberately NOT in the
# 5-minute loop — they poll external, rate-limited sources and folding them
# in at 5-min cadence would trade a cadence bug for a rate-limit ban.
# Ticking a feed at its OWN designed cadence, however, adds nothing above
# the load its budget always assumed — that is the rss precedent, and
# wire-ingest-hn joined it on 2026-07-06 (its 5,20,35,50 schedule went
# silent for 4.5h overnight → stale flag; heartbeat now ticks it every 3rd
# iteration = its designed 15-min cadence; own schedule stays as
# belt-and-braces per #64 verify-before-disable).
#
# wire-ingest-rss is the exception (added S93): the original "explicit-minute
# schedules drift far less" premise was FALSIFIED by observation — its
# `25,55 * * * *` schedule fired with 79min-4.3h real gaps, leaving the
# regional wire stale for hours at a time. It ticks every SIXTH loop
# iteration (30 min — exactly its designed cadence; once-per-run would leave
# it stale again at the observed 96-min restart gaps). 2/hour against 5
# public publisher feeds is the load it always assumed. Its own 25,55
# schedule stays as belt-and-braces until the heartbeat path is verified
# live (then retire it per the #64 verify-before-disable discipline).

on:
  schedule:
    - cron: "2,17,32,47 * * * *" # 4x/hour restart; explicit minutes are honoured far better than */5
  workflow_dispatch:

concurrency:
  group: heartbeat
  cancel-in-progress: true # exactly one live loop; a landed restart cancels the sleeping predecessor

permissions:
  contents: read

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 185
    steps:
      - name: Loop the live-critical ingests every 5 minutes
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$INGEST_SECRET" ]; then
            echo "::error::INGEST_URL or INGEST_SECRET is unset in repo secrets"
            exit 1
          fi
          BASE="${INGEST_URL%/api/ingest}"
          NOTIFY_URL="$BASE/api/notify/tool-alerts"
          RSS_URL="$BASE/api/wire/ingest-rss"
          HN_URL="$BASE/api/wire/ingest-hn?source=heartbeat&cap=20"

          # One tick = poll both live-critical endpoints, logging each HTTP
          # status. Every 6th iteration (30 min — its designed cadence) also
          # ticks the regional RSS ingest; see scope note. Per-endpoint
          # failures are non-fatal: a bad tick is retried on the next one,
          # and the loop must never exit early (that would reopen the gap).
          i=0
          tick() {
            local code
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 100 \
              -H "x-ingest-secret: $INGEST_SECRET" -X POST "$INGEST_URL" 2>/dev/null) || code="000"
            echo "$(date -u +%H:%M:%S) globe-ingest        -> $code"
            [ "$code" = "200" ] || echo "::warning::globe-ingest tick returned $code"

            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 \
              -H "x-ingest-secret: $INGEST_SECRET" -X POST "$NOTIFY_URL" 2>/dev/null) || code="000"
            echo "$(date -u +%H:%M:%S) notify-tool-alerts  -> $code"
            [ "$code" = "200" ] || echo "::warning::notify-tool-alerts tick returned $code"

            if [ $((i % 6)) -eq 0 ]; then
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 280 \
                -H "x-ingest-secret: $INGEST_SECRET" -X POST "$RSS_URL" 2>/dev/null) || code="000"
              echo "$(date -u +%H:%M:%S) wire-ingest-rss     -> $code"
              [ "$code" = "200" ] || echo "::warning::wire-ingest-rss tick returned $code"
            fi

            # Every 3rd iteration (15 min — wire-ingest-hn's designed 5,20,35,50
            # cadence; see scope note). POST, matching its own workflow's call.
            if [ $((i % 3)) -eq 0 ]; then
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 160 \
                -H "x-ingest-secret: $INGEST_SECRET" -X POST "$HN_URL" 2>/dev/null) || code="000"
              echo "$(date -u +%H:%M:%S) wire-ingest-hn      -> $code"
              [ "$code" = "200" ] || echo "::warning::wire-ingest-hn tick returned $code"
            fi
            i=$((i + 1))
          }

          # Loop for 175 min (> the 127-min max observed restart gap — see
          # header). A landed scheduled fire cancels this run seamlessly
          # (cancel-in-progress) for continuous coverage; if none lands, the
          # loop itself carries coverage for ~3h.
          end=$((SECONDS + 175 * 60))
          tick
          while [ "$SECONDS" -lt "$end" ]; do
            sleep 300
            tick
          done
          echo "Loop window elapsed; next scheduled fire continues coverage."
