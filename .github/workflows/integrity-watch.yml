name: integrity-watch

# The nervous system's active watcher. Reads /api/integrity (which probes
# gawk's live OUTPUT independently of the producing jobs) and pages Discord
# when the data is not genuine or has gone stale.
#
# Paging policy (calibrated to avoid free-tier-drift flapping):
#   - ANY source FAIL pages immediately (missing provenance, fabricated
#     data, malformed output, video not live — unambiguous, rare).
#   - STALE pages only for the daily-critical sources (daily-digest,
#     daily-video) where a single stale day is a real miss.
#   - Frequent sources (globe, feed) do NOT page on STALE — their drift is
#     visible on the board at /api/integrity but is not worth a 3am alert.
#
# Required repo secrets:
#   DISCORD_DAILY_WEBHOOK_URL — operational alert channel (shared w/ video).
#   INGEST_SECRET — auth for the containment shadow-cycle POST.
# Optional repo secrets:
#   INTEGRITY_URL — override the probed endpoint (defaults to prod).
#   CONTAINMENT_URL — override the shadow-cycle endpoint (defaults to prod).

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch: {}

concurrency:
  group: integrity-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe integrity board and page on real failures
        env:
          DISCORD_DAILY_WEBHOOK_URL: ${{ secrets.DISCORD_DAILY_WEBHOOK_URL }}
          INTEGRITY_URL: ${{ secrets.INTEGRITY_URL }}
        # Python does the fetch + retry + parse + page itself. (An earlier
        # version piped the body into `python3 - <<'PY'`, but the heredoc
        # and the pipe both claim stdin, so the script read nothing and
        # always reported non-JSON — the watchdog flaked on itself.)
        run: |
          python3 <<'PY'
          import json, os, sys, time, urllib.request

          url = os.environ.get("INTEGRITY_URL") or "https://gawk.dev/api/integrity"
          print(f"Probing {url}")

          body = None
          for attempt in range(1, 5):
              try:
                  with urllib.request.urlopen(url, timeout=70) as r:
                      body = r.read().decode()
                  json.loads(body)  # validate; retry if cold-start empty/HTML
                  break
              except Exception as e:
                  print(f"attempt {attempt}: {e}; retry in 8s (cold start?)")
                  time.sleep(8)

          try:
              d = json.loads(body) if body else None
              if d is None:
                  raise ValueError("empty body after retries")
          except Exception as e:
              print(f"::error::integrity endpoint unreachable / non-JSON: {e}")
              sys.exit(1)

          reports = d.get("reports", [])
          DAILY = {"daily-video", "daily-digest"}

          def pageable(r):
              v = r.get("verdict")
              if v == "FAIL":
                  return True
              if v == "STALE" and r.get("source") in DAILY:
                  return True
              return False

          print(f"board verdict={d.get('verdict')} counts={d.get('counts')}")
          for r in reports:
              print(f"  {r.get('source')}: {r.get('verdict')}")

          bad = [r for r in reports if pageable(r)]
          if not bad:
              print("integrity OK — nothing to page")
              sys.exit(0)

          lines = []
          for r in bad:
              fails = [c for c in r.get("checks", []) if not c.get("ok")]
              detail = "; ".join(c.get("detail", "") for c in fails) or r.get("verdict")
              lines.append(f"• **{r.get('source')}** [{r.get('verdict')}] — {detail}")

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          content = (
              "**DATA INTEGRITY ALERT** — gawk is serving non-genuine or stale data:\n"
              + "\n".join(lines)
              + f"\n\nBoard: {url}\nRun: https://github.com/{repo}/actions/runs/{run_id}"
          )

          hook = os.environ.get("DISCORD_DAILY_WEBHOOK_URL")
          if hook:
              req = urllib.request.Request(
                  hook,
                  data=json.dumps(
                      {"content": content[:1900], "username": "Gawk Integrity"}
                  ).encode(),
                  # Discord (via Cloudflare) 403s the default Python-urllib
                  # User-Agent; a real UA is required (curl works for the
                  # video alerts because it sends its own UA).
                  headers={
                      "Content-Type": "application/json",
                      "User-Agent": "Gawk-Integrity (+https://gawk.dev)",
                  },
              )
              try:
                  urllib.request.urlopen(req, timeout=15)
                  print("paged Discord")
              except Exception as e:
                  print(f"::warning::Discord post failed: {e}")
          else:
              print("::warning::DISCORD_DAILY_WEBHOOK_URL unset — cannot page")

          print(f"::error::integrity alert: {len(bad)} source(s) failing")
          sys.exit(1)
          PY

      # Containment loop, SHADOW MODE: run one probe cycle and print the
      # decisions it WOULD actuate. Nothing a user sees changes until the
      # serve path consumes containment state. `if: always()` +
      # `continue-on-error` so a shadow bug can never break the pager above
      # — the containment loop must not hurt the safety net it will replace.
      # This step's printed JSON is the shadow decision log adjudicated
      # against the exit criteria (PRD §6 change 10).
      - name: Containment shadow cycle (log-only, no actuation)
        if: always()
        continue-on-error: true
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          CONTAINMENT_URL: ${{ secrets.CONTAINMENT_URL }}
        run: |
          url="${CONTAINMENT_URL:-https://gawk.dev/api/containment/cycle}"
          echo "Shadow cycle: POST $url"
          body=$(curl -sS -X POST --max-time 70 \
            -H "x-ingest-secret: ${INGEST_SECRET}" \
            "$url") || { echo "::warning::shadow cycle request failed (non-blocking)"; exit 0; }
          echo "$body" | python3 -m json.tool || echo "$body"
